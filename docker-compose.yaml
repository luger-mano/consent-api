services:

  postgresql:
    image: postgres:18
    container_name: postgres_consent
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 3571
      POSTGRES_DB: consent
    volumes:
      - postgresql-data-consent:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d consent"]
      retries: 3
      timeout: 5s
      interval: 10s
      start_period: 30s

  consent:
    image: lucasgerman0/consent-api-msb:latest
    container_name: java
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgresql
    depends_on:
      postgresql:
        condition: service_healthy


volumes:
  postgresql-data-consent:
